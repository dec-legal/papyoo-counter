version: '3.8'

services:
  app:
    # Build the image from the Dockerfile in the current directory
    build: .
    container_name: my-project-app
    restart: unless-stopped
    ports:
      # Map port 80 on your VPS to port 3000 inside the container.
      # Users will access your app via http://<your-vps-ip>
      - "8050:3000"
    environment:
      # Set Node environment to production
      - NODE_ENV=production
      # Mongo connection string points to the mongo service name on the default network
      - MONGODB_URI=mongodb://mongo:27017/papyoo
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6
    container_name: my-project-mongo
    restart: unless-stopped
    ports:
      - "27017:27017" # optional: expose for local tooling/backup
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
